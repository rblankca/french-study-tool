const SYN=[
{theme:"Ways to say 'to want'",main:"vouloir",words:["vouloir","avoir envie de (feel like — casual)","souhaiter (wish — formal)","désirer (desire)","tenir à (really care about)"],note:"Avoir envie de = casual feel like. Souhaiter/désirer = formal. Tenir à = to really want/care about."},
{theme:"'To know' — savoir vs connaître",main:"savoir / connaître",words:["savoir (knowledge / how to do something)","connaître (person/place/situation)"],note:"NEVER swap! Savoir = factual knowledge or HOW to do something. Connaître = knowing a person or being familiar with something."},
{theme:"'Good' — bon vs bien vs beau",main:"bon / bien / beau",words:["bon/bonne (taste, quality, weather)","bien (adverb — action done well)","beau/belle (visual beauty)","magnifique / superbe","succulent (food)","formidable (positive!)"],note:"Bon = taste: 'c'est bon', 'il fait bon'. Bien = adverb: 'il joue bien'. NEVER use 'bien' for food or weather. Never say 'plus bien' — use 'mieux'."},
{theme:"'Bad' — mauvais vs mal vs pire",main:"mauvais / mal",words:["mauvais/mauvaise (taste, quality, weather)","mal (behavior, morals, adverb)","pire (worse/worst)","médiocre","affreux / horrible"],note:"Mauvais = bad taste or quality. Mal = bad behavior. Pire = worse/worst. Use mieux (not plus bien) for 'better'."},
{theme:"Ways to say 'to meet'",main:"rencontrer",words:["rencontrer (first time ever)","voir (see someone you know)","retrouver (meet up again)","se retrouver (meet each other again)","faire connaissance (get to know)","se rencontrer (first time, both together)"],note:"Rencontrer = FIRST TIME EVER. After that, use voir. Retrouver = to see again. Faire connaissance = to get to know each other."},
{theme:"Ways to say 'to move'",main:"bouger",words:["bouger (general movement)","déménager (move out of home)","emménager (move into home)","se déplacer (travel/commute)","s'installer (settle down)","déplacer (move an object)","reculer (step back)","avancer (step forward)"],note:"Déménager ≠ emménager! Déménager = move out. Emménager = move in. S'installer = settle/set up life."},

function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['vocab','cards','faux','syn'][i]===n));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+n).classList.add('active');
}

function rv(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const cat=document.getElementById('fc').value;
  const pos=document.getElementById('fp').value;
  const lvl=document.getElementById('fl').value;
  const f=V.filter(v=>{
    if(cat&&v.cat!==cat)return false;
    if(pos&&v.pos!==pos)return false;
    if(lvl&&v.lvl!==lvl)return false;
    if(q&&!v.fr.toLowerCase().includes(q)&&!v.en.toLowerCase().includes(q)&&!(v.note||'').toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('cnt').textContent=f.length+' words';
  document.getElementById('tbody').innerHTML=f.map(v=>`<tr>
    <td class="fw">${v.fr}</td>
    <td class="ew">${v.en}</td>
    <td><span class="pb ${PC[v.pos]}">${PL[v.pos]}</span></td>
    <td><span class="lb ${v.lvl}">${v.lvl}</span></td>
    <td class="nw">${v.note||''}</td>
  </tr>`).join('');
}

function loadCards(){
  const cat=document.getElementById('xcat').value;
  const lvl=document.getElementById('xlvl').value;
  cards=V.filter(v=>(!cat||v.cat===cat)&&(!lvl||v.lvl===lvl));
  ci=0;flipped=false;
  document.getElementById('ci').classList.remove('flipped');
  sc();
}

function sc(){
  if(!cards.length)return;
  const c=cards[ci];
  document.getElementById('cfr').textContent=c.fr;
  document.getElementById('cen').textContent=c.en;
  document.getElementById('cnote').textContent=c.note||'';
  document.getElementById('cm1').textContent=PL[c.pos]+' · '+c.lvl+' · '+c.cat;
  document.getElementById('cm2').textContent=PL[c.pos]+' · '+c.lvl;
  document.getElementById('prog').textContent=`Card ${ci+1} of ${cards.length}`;
  flipped=false;document.getElementById('ci').classList.remove('flipped');
}

function flip(){flipped=!flipped;document.getElementById('ci').classList.toggle('flipped',flipped);}
function next(){ci=(ci+1)%cards.length;sc();}
function prev(){ci=(ci-1+cards.length)%cards.length;sc();}
function shuf(){for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}ci=0;sc();}

function buildFaux(){
  document.getElementById('faux-grid').innerHTML=FAUX.map(f=>`<div class="fc">
    <div class="fh"><span class="fword">${f.word}</span><span class="ftag">Faux ami</span></div>
    <div class="fb">
      <div class="fr"><span class="fl">Means:</span><span class="fv" style="font-weight:600">${f.fr}</span></div>
      <div class="fr"><span class="fl">NOT:</span><span class="fv" style="color:#A32D2D">${f.ew}</span></div>
      <div class="fr"><span class="fl">Instead:</span><span class="fv">${f.c}</span></div>
      ${f.w?`<div class="fw3">${f.w}</div>`:''}
    </div>
  </div>`).join('');
}

function buildSyn(){
  document.getElementById('syn-content').innerHTML=`<p class="sl">Synonyms & confusable groups</p>
  <div class="sg">${SYN.map(s=>`<div class="sc">
    <h4>${s.theme}</h4>
    <div class="chips">${s.words.map((w,i)=>`<span class="chip${i===0?' m':''}">${w}</span>`).join('')}</div>
    ${s.note?`<div class="sn">${s.note}</div>`:''}
  </div>`).join('')}</div>`;
}

rv();buildFaux();buildSyn();loadCards();
</script>
