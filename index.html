  _grammarCheatsheets(){
    const cs=(title,content)=>html`
      <div class="card card-bordered bg-base-100 mb-6">
        <div class="card-body p-5">
          <h2 class="t-h3 mb-4">${title}</h2>
          ${content}
        </div>
      </div>
    `;
    const th=(cells)=>html`<tr>${cells.map(c=>html`<th class="bg-base-200 text-center px-3 py-2 t-sec text-base-content/60 font-semibold border border-base-300">${c}</th>`)}</tr>`;
    const tr=(cells,hi=false)=>html`<tr>${cells.map((c,i)=>html`<td class="px-3 py-2 border border-base-300 t-label ${i===0?'font-semibold bg-base-50':''} ${hi?'bg-violet-50':''} text-center">${c}</td>`)}</tr>`;

    // 1. Pronouns
    const pronounsTable=html`
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>${th(['Personne','Sujet','COD (Direct)','COI (Indirect)','Tonique','Réfléchi'])}</thead>
          <tbody>
            ${tr(['je / j\'','je','me','me','moi','me'])}
            ${tr(['tu','tu','te','te','toi','te'])}
            ${tr(['il / elle','il / elle','le / la','lui','lui / elle','se'],true)}
            ${tr(['nous','nous','nous','nous','nous','nous'])}
            ${tr(['vous','vous','vous','vous','vous','vous'])}
            ${tr(['ils / elles','ils / elles','les','leur','eux / elles','se'],true)}
          </tbody>
        </table>
      </div>
      <p class="t-caption text-base-content/50 mt-3">COD = remplace un objet direct · COI = remplace un objet indirect avec à · Tonique = après une préposition, seul, ou pour insister</p>
    `;

    // 2. DR MRS VANDERTRAMP
    const etreVerbs=[
      {emoji:'👶',verb:'Naître',past:'né(e)',note:'to be born'},
      {emoji:'🚶',verb:'Partir / Sortir',past:'parti(e) / sorti(e)',note:'to leave / go out'},
      {emoji:'🧳',verb:'Venir / Revenir / Devenir',past:'venu(e) / revenu(e) / devenu(e)',note:'to come / come back / become'},
      {emoji:'🏠',verb:'Aller',past:'allé(e)',note:'to go'},
      {emoji:'🚪',verb:'Entrer / Rentrer',past:'entré(e) / rentré(e)',note:'to enter / return home'},
      {emoji:'⬇️',verb:'Descendre',past:'descendu(e)',note:'to go down'},
      {emoji:'⬆️',verb:'Monter',past:'monté(e)',note:'to go up'},
      {emoji:'🔄',verb:'Retourner / Rester',past:'retourné(e) / resté(e)',note:'to return / stay'},
      {emoji:'🤒',verb:'Tomber',past:'tombé(e)',note:'to fall'},
      {emoji:'💀',verb:'Mourir',past:'mort(e)',note:'to die'},
      {emoji:'🚪',verb:'Arriver',past:'arrivé(e)',note:'to arrive'},
      {emoji:'🏃',verb:'Passer',past:'passé(e)',note:'to pass by'},
    ];
    const etreTable=html`
      <div class="mb-4">
        <img src="https://ecole601.com/wp-content/uploads/2023/08/image.png"
          alt="Maison du Dr et Mme Vandertramp — être verbs visual"
          class="max-w-full rounded-xl border border-violet-200 shadow-sm"
          style="max-height:420px;object-fit:contain;">
      </div>
      <div class="bg-violet-50 border border-violet-200 rounded-xl p-4 mb-3">
        <p class="t-label text-violet-700 font-semibold mb-3">Ces verbes utilisent <strong>ÊTRE</strong> comme auxiliaire au passé composé. Le participe passé s'accorde avec le sujet.</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
          ${etreVerbs.map(v=>html`
            <div class="flex items-center gap-2 bg-white rounded-lg px-3 py-2 border border-violet-100">
              <span class="text-xl">${v.emoji}</span>
              <div class="flex-1 min-w-0">
                <span class="t-label font-semibold text-violet-800">${v.verb}</span>
                <span class="t-caption text-violet-500 ml-1">→ ${v.past}</span>
              </div>
              <span class="t-caption text-base-content/40">${v.note}</span>
            </div>
          `)}
        </div>
      </div>
      <p class="t-caption text-base-content/50">+ tous les verbes pronominaux (se lever, se coucher…) utilisent aussi ÊTRE</p>
    `;

    // 3. Verb endings table
    const endingsTable=html`
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>${th(['Personne','-ER (parler)','-IR (finir)','-RE (vendre)','Irréguliers communs'])}</thead>
          <tbody>
            ${tr(['je / j\'','-e','-is','-s','être: suis, avoir: ai, aller: vais, faire: fais'])}
            ${tr(['tu','-es','-is','-s','être: es, avoir: as, aller: vas, faire: fais'],true)}
            ${tr(['il / elle','-e','-it','-',  'être: est, avoir: a, aller: va, faire: fait'])}
            ${tr(['nous','-ons','-issons','-ons','être: sommes, avoir: avons, aller: allons, faire: faisons'],true)}
            ${tr(['vous','-ez','-issez','-ez', 'être: êtes, avoir: avez, aller: allez, faire: faites'])}
            ${tr(['ils / elles','-ent','-issent','-ent','être: sont, avoir: ont, aller: vont, faire: font'])}
          </tbody>
        </table>
      </div>
    `;

    // 4. Tense formation formulas
    const tenseFormulas=[
      {tense:'Passé composé',formula:'avoir/être (présent) + participe passé',ex:'j\'ai mangé · je suis allé(e)'},
      {tense:'Imparfait',formula:'radical (nous présent) + -ais/-ais/-ait/-ions/-iez/-aient',ex:'je mangeais · nous allions'},
      {tense:'Futur simple',formula:'infinitif + -ai/-as/-a/-ons/-ez/-ont',ex:'je mangerai · il ira'},
      {tense:'Conditionnel',formula:'infinitif + -ais/-ais/-ait/-ions/-iez/-aient',ex:'je mangerais · tu irais'},
      {tense:'Subjonctif présent',formula:'radical (ils présent) + -e/-es/-e/-ions/-iez/-ent',ex:'que je mange · que nous allions'},
      {tense:'Plus-que-parfait',formula:'avoir/être (imparfait) + participe passé',ex:'j\'avais mangé · j\'étais allé(e)'},
    ];
    const formulasTable=html`
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>${th(['Temps','Formation','Exemple'])}</thead>
          <tbody>
            ${tenseFormulas.map((f,i)=>html`<tr>
              <td class="px-3 py-2 border border-base-300 t-label font-semibold ${i%2?'bg-base-50':''}">${f.tense}</td>
              <td class="px-3 py-2 border border-base-300 t-caption font-mono ${i%2?'bg-base-50':''}">${f.formula}</td>
              <td class="px-3 py-2 border border-base-300 t-caption text-base-content/60 ${i%2?'bg-base-50':''}">${f.ex}</td>
            </tr>`)}
          </tbody>
        </table>
      </div>
    `;

    // 5. Articles table
    const articlesTable=html`
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>${th(['Type','Masc. sing.','Fém. sing.','Pluriel','Exemple'])}</thead>
          <tbody>
            ${tr(['Défini (the)','le / l\'','la / l\'','les','le chat · la maison · les amis'])}
            ${tr(['Indéfini (a/an)','un','une','des','un chat · une maison · des amis'],true)}
            ${tr(['Partitif (some)','du (de l\')','de la (de l\')','des','du pain · de la chance'])}
            ${tr(['Négatif (no/not any)','de / d\'','de / d\'','de / d\'','pas de chat · pas d\'argent'],true)}
          </tbody>
        </table>
      </div>
      <p class="t-caption text-base-content/50 mt-2">Après une négation, tous les articles indéfinis et partitifs → <strong>de/d'</strong></p>
    `;

    // 6. Negation patterns
    const negPatterns=[
      {pattern:'ne … pas','meaning':'not','ex':'Je ne mange pas.'},
      {pattern:'ne … plus','meaning':'no longer / not anymore','ex':'Il ne travaille plus ici.'},
      {pattern:'ne … jamais','meaning':'never','ex':'Elle ne boit jamais d\'alcool.'},
      {pattern:'ne … rien','meaning':'nothing','ex':'Je ne vois rien.'},
      {pattern:'ne … personne','meaning':'nobody','ex':'Il n\'y a personne.'},
      {pattern:'ne … que','meaning':'only','ex':'Je ne mange que des légumes.'},
      {pattern:'ne … ni … ni','meaning':'neither … nor','ex':'Je n\'ai ni faim ni soif.'},
      {pattern:'ne … aucun(e)','meaning':'not any / none','ex':'Il n\'a aucune idée.'},
    ];
    const negTable=html`
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>${th(['Structure','Sens','Exemple'])}</thead>
          <tbody>
            ${negPatterns.map((n,i)=>html`<tr>
              <td class="px-3 py-2 border border-base-300 t-label font-semibold font-mono ${i%2?'bg-base-50':''}">${n.pattern}</td>
              <td class="px-3 py-2 border border-base-300 t-caption ${i%2?'bg-base-50':''}">${n.meaning}</td>
              <td class="px-3 py-2 border border-base-300 t-caption text-base-content/60 italic ${i%2?'bg-base-50':''}">${n.ex}</td>
            </tr>`)}
          </tbody>
        </table>
      </div>
    `;

    // 7. Comparisons
    const compTable=html`
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>${th(['Type','Plus…','Moins…','Aussi…','Exemple'])}</thead>
          <tbody>
            ${tr(['Adjectif','plus + adj + que','moins + adj + que','aussi + adj + que','Elle est plus grande que lui.'])}
            ${tr(['Adverbe','plus + adv + que','moins + adv + que','aussi + adv + que','Il parle plus vite que moi.'],true)}
            ${tr(['Nom','plus de + nom + que','moins de + nom + que','autant de + nom + que','J\'ai plus d\'amis que toi.'])}
          </tbody>
        </table>
      </div>
      <div class="mt-3 flex flex-wrap gap-2">
        ${[['bon','meilleur(e)','le/la meilleur(e)'],['bien','mieux','le mieux'],['mauvais','pire / plus mauvais','le pire'],['mal','pire / plus mal','le pire']].map(([base,comp,sup])=>html`
          <div class="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 t-caption">
            <span class="font-semibold text-amber-800">${base}</span>
            <span class="text-amber-600"> → ${comp} → ${sup}</span>
          </div>
        `)}
      </div>
      <p class="t-caption text-base-content/50 mt-2">Superlatif: le/la/les + plus/moins + adj (+ de + groupe nominal)</p>
    `;

    return html`
      ${cs('Pronoms personnels',pronounsTable)}
      ${cs('Passé composé avec ÊTRE — verbes clés',etreTable)}
      ${cs('Terminaisons du présent de l\'indicatif',endingsTable)}
      ${cs('Formation des temps principaux',formulasTable)}
      ${cs('Les articles',articlesTable)}
      ${cs('Structures négatives',negTable)}
      ${cs('Comparatifs et superlatifs',compTable)}
    `;
  }

      </div>
      ${!this.exCard?html`
        <div class="card bg-base-100 border border-base-300 max-w-lg mx-auto">
          <div class="card-body items-center text-center gap-4 py-16">
            <div class="text-6xl">✏️</div>
            <h2 class="text-2xl font-bold">Vocabulary Quiz</h2>
            <p class="text-base text-gray-600">See a French word — choose the correct English meaning from four options.</p>
            <button class="btn btn-primary btn-lg mt-2" @click=${()=>this._newExercise()}>Start Quiz</button>
          </div>
        </div>
      `:html`
        <div class="max-w-2xl mx-auto">
          <div class="card bg-base-100 border border-base-300 mb-6">
            <div class="card-body items-center text-center gap-4 py-10">
              <div class="flex gap-2 justify-center flex-wrap">
                ${this.exCard.lvl?html`<span class="badge ${LVL_BADGE[this.exCard.lvl]}">${this.exCard.lvl}</span>`:nothing}
                ${this.exCard.pos?html`<span class="badge ${POS_BADGE[this.exCard.pos]}">${POS_LABELS[this.exCard.pos]}</span>`:nothing}
              </div>
              <div class="text-5xl font-semibold">${this.exCard.fr}</div>
              <div class="text-base text-gray-500">What does this mean in English?</div>
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
            ${this.exChoices.map(choice=>html`
              <button class="btn btn-lg h-auto py-4 px-5 text-left leading-snug justify-start
                ${this.exAnswered===null?'btn-outline':
                  choice.fr===this.exCard.fr?'btn-success text-white':
                  choice===this.exAnswered?'btn-error text-white':
                  'btn-outline opacity-40'}"
                ?disabled=${this.exAnswered!==null}
                @click=${()=>this._answerEx(choice)}>
                ${choice.en}
              </button>
            `)}
          </div>
          ${this.exAnswered!==null?html`
            <div class="flex flex-col items-center gap-3">
              <div class="text-xl font-semibold ${this.exAnswered.fr===this.exCard.fr?'text-green-700':'text-red-700'}">
                ${this.exAnswered.fr===this.exCard.fr?'✓ Correct!':'✗ Not quite'}
              </div>
              ${this.exAnswered.fr!==this.exCard.fr?html`
                <div class="text-base text-gray-600">The answer was: <strong>${this.exCard.en}</strong></div>
                ${this.exCard.note?html`<div class="text-base text-gray-500 italic">${this.exCard.note}</div>`:nothing}
              `:nothing}
              <button class="btn btn-primary mt-2" @click=${()=>this._newExercise()}>Next →</button>
            </div>
          `:nothing}
        </div>
      `}
    `;
  }
  _faux(){
    return html`
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${FAUX.map(f=>html`
          <div class="card card-bordered bg-base-100">
            <div class="card-body p-4">
              <div class="flex items-center gap-2 mb-3">
                <span class="font-bold text-red-700">${f.word}</span>
                <span class="badge bg-red-100 text-red-600 border-transparent badge-sm">Faux ami</span>
              </div>
              <div class="space-y-1 text-sm">
                <div><span class="text-xs text-base-content/40 uppercase mr-1">Means:</span><strong>${f.fr}</strong></div>
                <div><span class="text-xs text-base-content/40 uppercase mr-1">NOT:</span><span class="text-red-700">${f.ew}</span></div>
                <div><span class="text-xs text-base-content/40 uppercase mr-1">Instead:</span>${f.c}</div>
              </div>
              ${f.w?html`<div class="bg-warning/10 border border-warning/30 rounded-lg text-sm mt-3 p-3 text-base-content/70 leading-relaxed">${f.w}</div>`:nothing}
            </div>
          </div>
        `)}
      </div>
    `;
  }
  _syn(){
    return html`
      <div class="text-xs font-bold uppercase tracking-widest text-base-content/40 mb-4">Synonyms &amp; Confusable Groups</div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        ${SYN.map(s=>html`
          <div class="card card-bordered bg-base-100">
            <div class="card-body p-4">
              <h3 class="font-semibold text-sm mb-2">${s.theme}</h3>
              <div class="flex flex-wrap gap-1 mb-2">
                ${s.words.map((w,i)=>html`<span class="badge badge-sm ${i===0?'bg-gray-200 text-gray-700 border-transparent':'bg-gray-100 text-gray-700 border-transparent'}">${w}</span>`)}
              </div>
              ${s.note?html`<p class="text-xs text-base-content/60 leading-relaxed">${s.note}</p>`:nothing}
            </div>
          </div>
        `)}
      </div>
    `;
  }
}
customElements.define('french-app',FrenchApp);
</script>
</body>
</html>
